<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Almanac: Mambo</title>
<link rel="stylesheet" href="css/styles.css" / >
<script type="importmap">
{
	"imports": {
		"q/": "https://cdn.we-evolve.co.uk/js/q/v1.1.0/"
	}
}
</script>
</head>
<body>

<main>
	<h1>’Bo</h1>

	<div data-q-component="timer" class="timer">
		<span data-q-text="formattedTime"></span>
	</div>

	<div data-q-component="mambo">
		<div class="board"></div>
		<div class="buttons">
			<button data-q-click="reset">Clear</button>
			<button data-q-click="undo">Undo</button>
		</div>
	</div>
</main>

<script type="module">

import { directives } from 'q/reactive/directives.js'
import { state } from './js/components/state.js'
import Timer from './js/components/timer.js'
import Mambo from './js/modules/mambo/component.js'

state.on('gameover', () => console.log('gameover'))
state.on('time', (time) => console.log('time', time))
state.on('pause', (time) => console.log('pause'))

directives.registerComponent('timer', Timer)
directives.registerComponent('mambo', Mambo)
directives.load(document.body)

</script>

</body>
</html>
