<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Knack for Games</title>
<link rel="stylesheet" href="css/styles.css" / >
<script type="importmap">
{
	"imports": {
		"q/": "https://cdn.we-evolve.co.uk/js/q/v1.1.1/",
		"utils/": "./js/utils/",
		"components/": "./js/components/",
		"menu/": "./js/modules/menu/"
	}
}
</script>
</head>
<body>

<main>
	<h1>Knack</h1>
	<h2>A Knack for Games</h2>

	<menu data-q-component="menu">
		<li data-q-each="games">
			<a data-q-href="url">
				<h3 data-q-text="title"></h3>
				<p data-q-text="strapline"></p>
				<dl data-q-if="showStats">
					<dt>Best:</dt>
					<dd data-q-text="best"></dd>
					<dt>Last:</dt>
					<dd data-q-text="last"></dd>
				</dl>
			</a>
		</li>
	</menu>
</main>

<script type="module">

import { directives } from 'q/reactive/directives.js'
import Menu from 'menu/component.js'

directives.registerComponent('menu', Menu)
directives.load(document.body)

</script>

</body>
</html>
